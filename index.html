<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BĄBELKOWY SYSTEM PRO - WERSJA KOMPLETNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar { transform: translateX(-100%); transition: transform 0.4s ease; }
        .sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div id="login-layer" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl w-80 text-center">
            <h2 class="text-xl font-bold mb-4">LOGOWANIE</h2>
            <input type="password" id="pass-field" class="w-full p-2 border mb-4 rounded" placeholder="Kod dostępu...">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">WEJDŹ</button>
        </div>
    </div>

    <div id="app-shell" class="hidden w-[400px] h-[700px] bg-white rounded-3xl overflow-hidden relative shadow-2xl">
        <header class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <button onclick="toggleSidebar(true)" class="text-2xl">☰</button>
            <h1 class="font-bold">SYSTEM BĄBELKOWY</h1>
            <button onclick="location.reload()" class="text-[10px]">WYLOGUJ</button>
        </header>

        <div id="sidebar" class="sidebar absolute inset-0 bg-gray-800 text-white z-40 p-8">
            <button onclick="toggleSidebar(false)" class="text-2xl mb-8">✕</button>
            <div class="space-y-6 text-xl">
                <div onclick="showPage('main')" class="cursor-pointer">🫧 Skarbonka</div>
                <div onclick="showPage('garden')" class="cursor-pointer">🏡 Ogród</div>
                <div onclick="showPage('history')" class="cursor-pointer">📊 Historia</div>
            </div>
        </div>

        <div class="p-6">
            <div id="page-main" class="page-view active">
                <h2 class="text-2xl font-bold">Saldo: <span id="balance">0.00</span> €</h2>
                <button onclick="atm()" class="mt-4 w-full bg-green-500 py-3 rounded">BANKOMAT</button>
                <div id="goals-list" class="mt-4 space-y-2"></div>
                <button onclick="addGoal()" class="mt-4 w-full border py-2 rounded">+ Cel</button>
            </div>
            <div id="page-garden" class="page-view">
                <h2 class="text-2xl font-bold mb-4">Twój Ogród</h2>
                <div id="garden-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div id="page-history" class="page-view">
                <h2 class="text-2xl font-bold mb-4">Historia</h2>
                <div id="history-log" class="text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const state = JSON.parse(localStorage.getItem('systemData')) || { balance: 0, goals: [], history: [], garden: [null, null, null, null] };

        function login() {
            if(document.getElementById('pass-field').value === '123') {
                document.getElementById('login-layer').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
            } else alert('Błędne hasło');
        }

        function toggleSidebar(open) {
            document.getElementById('sidebar').classList.toggle('open', open);
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            toggleSidebar(false);
        }

        function atm() {
            const val = parseFloat(prompt("Kwota €:"));
            if(!isNaN(val)) {
                state.balance += val;
                state.history.push({ type: 'Wpłata', amount: val, date: new Date().toLocaleDateString() });
                save();
            }
        }

        function addGoal() {
            const name = prompt("Nazwa celu:");
            if(name) { state.goals.push({ name }); save(); }
        }

        function save() {
            localStorage.setItem('systemData', JSON.stringify(state));
            render();
        }

        function render() {
            document.getElementById('balance').innerText = state.balance.toFixed(2);
            document.getElementById('goals-list').innerHTML = state.goals.map(g => `<div class="p-2 border rounded">${g.name}</div>`).join('');
            document.getElementById('history-log').innerHTML = state.history.map(h => `<div class="p-2 border-b">${h.type}: ${h.amount}€</div>`).join('');
        }

        render();
    </script>
</body>
</html>
