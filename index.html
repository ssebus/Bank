<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bąbelkowy Ogród Finansowy Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .white-glow-bg { background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 50%, #f0fdf4 100%); }
    </style>
</head>
<body class="white-glow-bg min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white/80 backdrop-blur-2xl w-full max-w-md h-[880px] rounded-[42px] shadow-2xl border-8 border-white overflow-hidden flex flex-col relative">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-cyan-400 to-emerald-500 p-5 flex justify-between items-center text-white">
            <h1 class="font-black text-base">🫧 BĄBELKOWY OGRÓD</h1>
            <button id="logout-btn" onclick="logout()" class="hidden bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">Wysuń kartę</button>
        </header>

        <!-- Auth Panel -->
        <div id="auth-panel" class="flex-1 flex flex-col justify-center px-8">
            <h2 class="text-2xl font-black mb-6">Otwórz Portfel i Ogród €</h2>
            <input type="email" id="user-email" placeholder="E-mail" class="w-full p-3 mb-3 rounded-xl border border-slate-200">
            <input type="password" id="user-password" placeholder="Hasło" class="w-full p-3 mb-4 rounded-xl border border-slate-200">
            <button onclick="executeAuth()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-xl">Zaloguj / Zarejestruj</button>
        </div>

        <!-- Main App Views -->
        <div id="app-content" class="hidden flex-1 flex flex-col overflow-y-auto">
            
            <!-- Widok Główny (Skarbonka) -->
            <div id="view-main" class="p-5 space-y-6">
                <div class="bg-white border-2 border-cyan-100 p-6 rounded-3xl">
                    <p class="text-[10px] text-slate-400 font-bold">Wolne Środki</p>
                    <h3 class="text-4xl font-black"><span id="display-balance">0.00</span> €</h3>
                    <button onclick="showAtm()" class="mt-4 w-full bg-slate-900 text-white py-3 rounded-xl font-black">🎰 Uruchom Maszynę</button>
                </div>
            </div>

            <!-- Widok Ogrodu -->
            <div id="view-garden" class="p-5 space-y-6">
                <div class="bg-blue-50 p-4 rounded-2xl">
                    <p class="font-black text-blue-800">💧 Woda: <span id="water-drops-count">0</span> Litrów</p>
                </div>
                <div id="garden-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Modale -->
    <div id="atm-modal" class="hidden absolute inset-0 bg-black/50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6">
            <h3 class="font-black mb-4">Bankomat Matrycowy €</h3>
            <input type="number" id="atm-value" placeholder="Kwota" class="w-full p-3 mb-4 rounded-xl border">
            <button onclick="processAtm('deposit')" class="w-full bg-emerald-500 text-white py-3 rounded-xl mb-2">Wpłać</button>
            <button onclick="document.getElementById('atm-modal').classList.add('hidden')" class="w-full bg-slate-100 py-3 rounded-xl">Zamknij</button>
        </div>
    </div>

    <script>
        let loggedUser = null;

        function getDB() { return JSON.parse(localStorage.getItem('bubbleGardenDB') || '{}'); }
        function saveDB(db) { localStorage.setItem('bubbleGardenDB', JSON.stringify(db)); }

        function executeAuth() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-password').value;
            let db = getDB();

            if (!db[email]) {
                db[email] = { password: pass, balance: 0, water: 0, garden: [null, null, null, null] };
                saveDB(db);
                alert("Konto utworzone!");
            }

            if (db[email].password === pass) {
                loggedUser = email;
                document.getElementById('auth-panel').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                updateUI();
            } else { alert("Błędne hasło!"); }
        }

        function updateUI() {
            let user = getDB()[loggedUser];
            document.getElementById('display-balance').innerText = user.balance.toFixed(2);
            document.getElementById('water-drops-count').innerText = user.water;
            
            const grid = document.getElementById('garden-grid');
            grid.innerHTML = '';
            user.garden.forEach((plant, i) => {
                grid.innerHTML += `
                    <div onclick="interactGarden(${i})" class="bg-white border p-4 h-32 flex flex-col items-center justify-center cursor-pointer rounded-3xl">
                        <span class="text-3xl">${plant ? '🌱' : '🟤'}</span>
                        <p class="text-[10px] font-bold mt-2">${plant ? 'Podlej (1L)' : 'Posadź'}</p>
                    </div>
                `;
            });
        }

        function processAtm(type) {
            let amount = parseFloat(document.getElementById('atm-value').value);
            let db = getDB();
            if (type === 'deposit') {
                db[loggedUser].balance += amount;
                db[loggedUser].water += Math.floor(amount * 0.5); // Dodawanie wody za wpłatę
                saveDB(db);
                updateUI();
                document.getElementById('atm-modal').classList.add('hidden');
            }
        }

        function interactGarden(i) {
            let db = getDB();
            let user = db[loggedUser];
            if (!user.garden[i]) {
                user.garden[i] = { alive: true };
            } else if (user.water >= 1) {
                user.water -= 1;
                alert("Podlano!");
            } else { alert("Za mało wody!"); }
            saveDB(db);
            updateUI();
        }

        function showAtm() { document.getElementById('atm-modal').classList.remove('hidden'); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
