<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bąbelkowy Ogród Pro - Pełny System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .white-glow-bg { background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 50%, #f0fdf4 100%); background-size: 200% 200%; animation: lightShine 12s ease infinite; }
        @keyframes lightShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Animacje elementów */
        @keyframes bubble-rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 15% { opacity: 0.8; } 100% { transform: translateY(-180px) scale(1.3); opacity: 0; } }
        .bubble { animation: bubble-rise 4s infinite linear; }
        
        /* Animacje bankomatu */
        @keyframes insert-bill { 0% { bottom: -100px; opacity: 1; } 100% { bottom: 100px; opacity: 0; } }
        .anim-bill { animation: insert-bill 1.5s ease-out forwards; }
        
        .neon-glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.35); }
    </style>
</head>
<body class="white-glow-bg min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/80 backdrop-blur-2xl w-full max-w-md h-[880px] rounded-[42px] shadow-2xl border-8 border-white overflow-hidden flex flex-col relative">
        
        <header class="bg-gradient-to-r from-cyan-400 to-emerald-500 p-6 flex justify-between items-center text-white shadow-lg">
            <button onclick="toggleSidebar(true)" class="text-3xl font-bold">☰</button>
            <h1 class="font-black tracking-widest">BĄBELKOWY OGRÓD</h1>
            <button onclick="resetApp()" class="text-[9px] font-bold bg-black/20 px-2 py-1 rounded-full">RESET</button>
        </header>

        <div id="sidebar" class="absolute inset-y-0 left-0 w-64 bg-white z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl p-6">
            <button onclick="toggleSidebar(false)" class="text-2xl mb-8">✕</button>
            <nav class="space-y-6 text-slate-700 font-bold">
                <div onclick="showView('main')" class="cursor-pointer hover:text-cyan-600">🫧 Skarbonka (Cele)</div>
                <div onclick="showView('garden')" class="cursor-pointer hover:text-emerald-600">🏡 Twój Ogród</div>
                <div onclick="showView('history')" class="cursor-pointer hover:text-slate-500">📊 Historia</div>
            </nav>
        </div>

        <div class="flex-1 overflow-y-auto p-6">
            
            <div id="view-main">
                <div class="bg-white p-6 rounded-3xl neon-glow-cyan mb-8">
                    <p class="text-xs text-slate-400 uppercase font-bold">Dostępne Euro</p>
                    <h3 class="text-5xl font-black mt-2 font-mono"><span id="balance">0.00</span> €</h3>
                    <button onclick="document.getElementById('atm-modal').classList.remove('hidden')" class="mt-6 w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest">🎰 Otwórz Bankomat</button>
                </div>
                
                <h4 class="font-black text-slate-600 mb-4 uppercase text-xs">Twoje Cele</h4>
                <div id="goals-list" class="space-y-4"></div>
                <button onclick="addNewGoal()" class="mt-4 w-full border-2 border-dashed border-slate-300 py-3 rounded-xl text-slate-400 font-bold">+ Dodaj Cel</button>
            </div>

            <div id="view-garden" class="hidden">
                <h2 class="font-black text-xl mb-6">🏡 Mój Ogród</h2>
                <div class="grid grid-cols-2 gap-4" id="garden-grid"></div>
            </div>

            <div id="view-history" class="hidden">
                <h2 class="font-black text-xl mb-6">📊 Historia Operacji</h2>
                <div id="history-items" class="space-y-3"></div>
            </div>

        </div>
    </div>

    <div id="atm-modal" class="hidden absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[32px] w-full shadow-2xl">
            <h3 class="font-black text-xl mb-6">Bankomat €</h3>
            <input type="number" id="atm-amount" placeholder="Wpisz kwotę" class="w-full p-4 bg-slate-100 rounded-xl mb-4 font-bold">
            <button onclick="processTransaction('deposit')" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black mb-2">WPŁATA</button>
            <button onclick="processTransaction('withdraw')" class="w-full bg-red-500 text-white py-4 rounded-xl font-black mb-4">WYPŁATA</button>
            <button onclick="document.getElementById('atm-modal').classList.add('hidden')" class="w-full text-xs font-bold text-slate-400">Zamknij</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('gardenState')) || { 
            balance: 0, 
            history: [], 
            goals: [], 
            garden: Array(4).fill({planted: false, name: ''}) 
        };

        function save() { localStorage.setItem('gardenState', JSON.stringify(state)); updateUI(); }

        function toggleSidebar(show) { document.getElementById('sidebar').style.transform = show ? 'translateX(0)' : 'translateX(-100%)'; }

        function showView(view) {
            ['main', 'garden', 'history'].forEach(v => document.getElementById('view-' + v).classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
            toggleSidebar(false);
        }

        function processTransaction(type) {
            let val = parseFloat(document.getElementById('atm-amount').value);
            if(type === 'deposit') state.balance += val;
            else if(state.balance >= val) state.balance -= val;
            
            state.history.unshift({type: type, val: val, date: new Date().toLocaleDateString()});
            document.getElementById('atm-modal').classList.add('hidden');
            save();
        }

        function addNewGoal() {
            let name = prompt("Nazwa celu:");
            if(name) { state.goals.push({name: name, current: 0}); save(); }
        }

        function resetApp() { if(confirm("Czy na pewno?")) { localStorage.clear(); location.reload(); } }

        function updateUI() {
            document.getElementById('balance').innerText = state.balance.toFixed(2);
            const gl = document.getElementById('goals-list');
            gl.innerHTML = state.goals.map(g => `<div class="bg-white p-4 rounded-2xl border border-slate-100">${g.name}</div>`).join('');
            const hl = document.getElementById('history-items');
            hl.innerHTML = state.history.map(h => `<div class="text-xs p-3 bg-white rounded-xl">${h.type.toUpperCase()}: ${h.val}€</div>`).join('');
        }

        updateUI();
    </script>
</body>
</html>
