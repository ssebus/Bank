<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bąbelkowy Ogród - Start Natychmiastowy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .white-glow-bg { background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 50%, #f0fdf4 100%); background-size: 200% 200%; animation: lightShine 12s ease infinite; }
        @keyframes lightShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes wave-turn { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .wave-effect { animation: wave-turn 7s linear infinite; }
        @keyframes bubble-rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 15% { opacity: 0.8; } 85% { opacity: 0.4; } 100% { transform: translateY(-180px) scale(1.3); opacity: 0; } }
        .bubble { animation: bubble-rise infinite linear; }
        @keyframes insert-bill { 0% { bottom: -70px; transform: scale(1) translateX(40px); opacity: 1; } 100% { bottom: 60px; transform: scale(0.1) translateX(40px); opacity: 0; } }
        @keyframes eject-bill { 0% { bottom: 60px; transform: scale(0.1) translateX(40px); opacity: 0; } 100% { bottom: -20px; transform: scale(1) translateX(40px); opacity: 1; } }
        @keyframes insert-coin { 0% { top: -40px; transform: translateX(-60px) scale(1); opacity: 1; } 50% { top: 30px; transform: translateX(-60px) scale(1.1); } 100% { top: 120px; transform: translateX(-60px) scale(0.2); opacity: 0; } }
        @keyframes eject-coin { 0% { top: 30px; transform: translateX(-60px) scale(0); opacity: 0; } 100% { top: 115px; transform: translateX(-60px) scale(1); opacity: 1; } }
        .anim-bill-in { animation: insert-bill 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .anim-bill-out { animation: eject-bill 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .anim-coin-in { animation: insert-coin 1.1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        .anim-coin-out { animation: eject-coin 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .neon-glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.35); }
        .neon-glow-emerald { box-shadow: 0 0 25px rgba(16, 185, 129, 0.45); }
    </style>
</head>
<body class="white-glow-bg min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">
    <div class="bg-white/80 backdrop-blur-2xl w-full max-w-md h-[880px] rounded-[42px] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.1)] border-8 border-white overflow-hidden flex flex-col relative">
        <header class="bg-gradient-to-r from-cyan-400 to-emerald-500 p-5 flex justify-between items-center border-b border-white/40 shadow-sm text-white relative z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar(true)" class="text-2xl cursor-pointer">☰</button>
                <div>
                    <h1 class="font-black text-base" id="lng-app-title">🫧 BĄBELKOWY OGRÓD</h1>
                    <p class="text-[10px] text-emerald-50 italic">✨ System Aktywny</p>
                </div>
            </div>
            <button onclick="resetSystemData()" class="bg-red-500/30 text-[10px] px-2.5 py-1.5 rounded-full font-bold">Reset</button>
        </header>

        <div id="sidebar-menu" class="absolute inset-y-0 left-0 w-64 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col">
            <div class="p-5 border-b flex justify-between items-center"><span class="font-black text-slate-700">MENU</span><button onclick="toggleSidebar(false)" class="text-lg">✕</button></div>
            <div class="p-4 space-y-2 flex-1">
                <button onclick="switchView('main')" class="w-full text-left font-bold p-3 rounded-xl hover:bg-cyan-50">🫧 Skarbonka</button>
                <button onclick="switchView('garden')" class="w-full text-left font-bold p-3 rounded-xl hover:bg-emerald-50">🏡 Ogród</button>
                <button onclick="switchView('history')" class="w-full text-left font-bold p-3 rounded-xl hover:bg-slate-50">📊 Historia</button>
            </div>
        </div>
        <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="absolute inset-0 bg-black/20 hidden z-40"></div>

        <div id="view-main" class="flex-1 flex flex-col overflow-y-auto p-5 space-y-6">
            <div class="bg-white border-2 border-cyan-100 p-5 rounded-3xl shadow-sm neon-glow-cyan">
                <p class="text-[10px] text-slate-400 uppercase font-bold">Wolne Środki</p>
                <h3 class="text-4xl font-black mt-1 font-mono"><span id="display-balance">0.00</span> €</h3>
                <button onclick="launchAtm()" class="mt-4 w-full bg-slate-900 text-white text-xs font-black py-3.5 rounded-xl">🎰 Uruchom Maszynę €</button>
            </div>
            <div id="goals-list-box" class="space-y-4"></div>
            <button onclick="showNewGoalForm()" class="w-full p-3 bg-cyan-100 rounded-xl font-bold text-xs text-cyan-700">+ Nowy Cel</button>
        </div>

        <div id="view-garden" class="hidden flex-1 flex flex-col p-5 overflow-y-auto space-y-6">
            <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center font-bold">
                <span>💧 Woda:</span><span id="water-drops-count" class="text-2xl text-blue-600">0</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <script>for(let i=0; i<4; i++) document.write(`<div onclick="clickGardenSlot(${i})" class="bg-white border rounded-3xl p-4 h-48 cursor-pointer flex flex-col items-center justify-center text-center"><div id="slot-avatar-${i}" class="text-4xl">🟤</div><div id="slot-name-${i}" class="text-xs font-black mt-2">Pusta gleba</div><div id="slot-progress-box-${i}" class="w-full mt-2 hidden"><div class="w-full bg-slate-100 h-1.5 rounded-full"><div id="slot-bar-${i}" class="bg-emerald-500 h-full w-[0%]"></div></div></div></div>`);</script>
            </div>
        </div>

        <div id="view-history" class="hidden flex-1 flex flex-col p-5 overflow-y-auto">
            <h3 class="font-black text-sm mb-4 uppercase">📊 Księga operacji</h3>
            <div id="history-list" class="space-y-2"></div>
        </div>

        <div id="atm-modal" class="absolute inset-0 bg-slate-900/40 hidden z-50 flex items-center justify-center p-6"><div class="bg-white p-6 rounded-3xl w-full">
            <h3 class="font-black mb-4">Bankomat</h3>
            <select id="atm-direction" class="w-full p-3 bg-slate-100 rounded-xl mb-4"><option value="deposit">Wpłata</option><option value="withdraw">Wypłata</option></select>
            <input type="number" id="atm-value-input" placeholder="0.00" class="w-full p-3 bg-slate-100 rounded-xl mb-4">
            <button onclick="startAtmAnimationRoutine()" class="w-full bg-emerald-500 text-white font-black py-3 rounded-xl">Zatwierdź</button>
            <button onclick="hideAtm()" class="w-full mt-2 text-xs font-bold text-slate-400">Zamknij</button>
        </div></div>

        <div id="seed-modal" class="absolute inset-0 bg-slate-900/40 hidden z-50 flex items-center justify-center p-6"><div class="bg-white p-6 rounded-3xl w-full text-center">
            <h3 class="font-black mb-4">Co posiać?</h3>
            <input type="hidden" id="selected-slot-index">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="plantSeed('Cebula', '🧅')" class="p-3 bg-amber-50 rounded-xl">🧅</button>
                <button onclick="plantSeed('Marchewka', '🥕')" class="p-3 bg-orange-50 rounded-xl">🥕</button>
                <button onclick="plantSeed('Pomidor', '🍅')" class="p-3 bg-red-50 rounded-xl">🍅</button>
                <button onclick="plantSeed('Jabłoń', '🍎')" class="p-3 bg-emerald-50 rounded-xl">🍎</button>
            </div>
        </div></div>

        <div id="new-goal-modal" class="absolute inset-0 bg-slate-900/40 hidden z-50 flex items-center justify-center p-6"><div class="bg-white p-6 rounded-3xl w-full">
            <h3 class="font-black mb-4">Nowy cel</h3>
            <input type="text" id="new-goal-title" placeholder="Nazwa" class="w-full p-3 bg-slate-100 rounded-xl mb-2">
            <input type="number" id="new-goal-max" placeholder="Kwota" class="w-full p-3 bg-slate-100 rounded-xl mb-4">
            <button onclick="saveCreatedGoal()" class="w-full bg-emerald-400 text-white font-black py-3 rounded-xl">Stwórz</button>
        </div></div>
    </div>

    <script>
        let mainStorage = { balance: 0, waterDrops: 0, goals: [], history: [], garden: Array(4).fill().map(() => ({ planted: false, progress: 0 })) };
        
        function save() { localStorage.setItem('data', JSON.stringify(mainStorage)); }
        function load() { const d = localStorage.getItem('data'); if(d) mainStorage = JSON.parse(d); render(); }
        
        function toggleSidebar(open) { document.getElementById('sidebar-menu').style.transform = open ? 'translateX(0)' : 'translateX(-100%)'; document.getElementById('sidebar-overlay').classList.toggle('hidden', !open); }
        function switchView(v) { ['view-main', 'view-garden', 'view-history'].forEach(id => document.getElementById(id).classList.toggle('hidden', id !== 'view-'+v)); toggleSidebar(false); render(); }
        
        function launchAtm() { document.getElementById('atm-modal').classList.remove('hidden'); }
        function hideAtm() { document.getElementById('atm-modal').classList.add('hidden'); }
        
        function startAtmAnimationRoutine() {
            const val = parseFloat(document.getElementById('atm-value-input').value);
            const dir = document.getElementById('atm-direction').value;
            if(dir === 'deposit') mainStorage.balance += val; else if(mainStorage.balance >= val) mainStorage.balance -= val;
            mainStorage.history.unshift({type: dir, amount: val, date: new Date().toLocaleTimeString()});
            save(); render(); hideAtm();
        }

        function showNewGoalForm() { document.getElementById('new-goal-modal').classList.remove('hidden'); }
        function saveCreatedGoal() {
            mainStorage.goals.push({ id: Date.now(), name: document.getElementById('new-goal-title').value, current: 0, target: parseFloat(document.getElementById('new-goal-max').value) });
            document.getElementById('new-goal-modal').classList.add('hidden'); save(); render();
        }

        function clickGardenSlot(i) {
            if(!mainStorage.garden[i].planted) { document.getElementById('selected-slot-index').value = i; document.getElementById('seed-modal').classList.remove('hidden'); }
            else { mainStorage.garden[i].progress = Math.min(mainStorage.garden[i].progress + 25, 100); save(); render(); }
        }
        function plantSeed(name, emoji) { 
            const i = document.getElementById('selected-slot-index').value;
            mainStorage.garden[i] = { planted: true, name, emoji, progress: 10 };
            document.getElementById('seed-modal').classList.add('hidden'); save(); render();
        }

        function render() {
            document.getElementById('display-balance').innerText = mainStorage.balance.toFixed(2);
            document.getElementById('water-drops-count').innerText = mainStorage.waterDrops;
            const glb = document.getElementById('goals-list-box'); glb.innerHTML = '';
            mainStorage.goals.forEach(g => glb.innerHTML += `<div class="bg-white p-4 rounded-xl border">${g.name}: ${g.current}/${g.target}€</div>`);
            mainStorage.garden.forEach((s, i) => {
                if(s.planted) {
                    document.getElementById('slot-avatar-'+i).innerText = s.emoji;
                    document.getElementById('slot-name-'+i).innerText = s.name;
                    document.getElementById('slot-progress-box-'+i).classList.remove('hidden');
                    document.getElementById('slot-bar-'+i).style.width = s.progress + '%';
                }
            });
            const hList = document.getElementById('history-list'); hList.innerHTML = '';
            mainStorage.history.forEach(h => hList.innerHTML += `<div class="text-xs p-2 bg-white border rounded">${h.type}: ${h.amount}€</div>`);
        }
        
        function resetSystemData() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
        window.onload = load;
    </script>
</body>
</html>
