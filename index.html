<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankomat Supabase</title>
    <!-- Tailwind CSS dla ładnego wyglądu -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bubble-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bubble-bg min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <!-- EKRAN 1: KONFIGURACJA SUPABASE -->
    <div id="config-screen" class="bg-white/95 backdrop-blur-md p-8 rounded-3xl shadow-2xl max-w-md w-full border border-white/20 transition-all duration-300">
        <div class="text-center mb-6">
            <div class="inline-block p-3 bg-emerald-100 text-emerald-600 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v6a2 2 0 012-2m14-10V7a2 2 0 00-2-2H5a2 2 0 00-2 2v4" /></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">Połącz z bazą Supabase</h2>
            <p class="text-sm text-gray-500 mt-1">Wklej swoje klucze projektu, aby uruchomić aplikację</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Project URL</label>
                <input type="text" id="supa-url" placeholder="https://xyz.supabase.co" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Anon Public API Key</label>
                <input type="password" id="supa-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition text-sm">
            </div>
            <button onclick="saveConfiguration()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/20 transition transform active:scale-98 mt-2 cursor-pointer">
                Połącz i Uruchom aplikację
            </button>
        </div>
    </div>

    <!-- EKRAN 2: BANKOMAT (UKRYTY NA STARCIE) -->
    <div id="atm-screen" class="hidden bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-2xl max-w-md w-full border border-white/20 transition-all duration-300">
        <!-- Nagłówek Bankomatu -->
        <div class="flex justify-between items-center mb-6 border-b border-gray-200/50 pb-4">
            <div class="flex items-center gap-2">
                <span class="flex h-3 w-3 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="font-bold tracking-wider text-gray-700 text-sm">ONLINE BANK</span>
            </div>
            <button onclick="disconnectSupabase()" class="text-xs text-red-500 hover:underline cursor-pointer">Odłącz bazę</button>
        </div>

        <!-- Ekran Główny Bankomatu -->
        <div id="atm-display" class="bg-slate-900 text-emerald-400 p-6 rounded-2xl font-mono shadow-inner mb-6 min-h-[180px] flex flex-col justify-between relative overflow-hidden border-4 border-slate-700">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/20 pointer-events-none"></div>
            
            <!-- Zawartość dynamiczna ekranu bankomatu -->
            <div id="display-content" class="z-10 text-center py-4">
                <p class="text-xl animate-pulse">Włóż kartę...</p>
                <p class="text-xs text-slate-400 mt-2">(Wpisz PIN poniżej, aby się zalogować)</p>
            </div>
            
            <!-- Dolny pasek statusu -->
            <div class="z-10 flex justify-between text-[10px] text-emerald-600 border-t border-emerald-900/50 pt-2 mt-2">
                <span id="user-status">BRAK KARTY</span>
                <span>V1.0-SUPABASE</span>
            </div>
        </div>

        <!-- Klawiatura i Funkcje -->
        <div id="atm-controls" class="space-y-4">
            <!-- Panel logowania (PIN) -->
            <div id="pin-panel" class="space-y-3">
                <input type="password" id="pin-input" maxlength="4" placeholder="____" class="w-full text-center text-3xl tracking-widest font-bold py-2 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500">
                <button onclick="loginWithPin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition cursor-pointer">
                    Zatwierdź PIN
                </button>
            </div>

            <!-- Panel operacji (Ukryty przed zalogowaniem) -->
            <div id="operation-panel" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="showWithdraw()" class="bg-slate-800 hover:bg-slate-700 text-white p-3 rounded-xl font-medium transition cursor-pointer text-sm">
                        💸 Wypłata
                    </button>
                    <button onclick="showDeposit()" class="bg-slate-800 hover:bg-slate-700 text-white p-3 rounded-xl font-medium transition cursor-pointer text-sm">
                        💵 Wpłata
                    </button>
                </div>
                
                <!-- Dynamiczny formularz kwoty -->
                <div id="amount-form" class="hidden bg-gray-50 p-3 rounded-xl border border-gray-200 space-y-2">
                    <input type="number" id="amount-input" placeholder="Wpisz kwotę (zł)" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none text-center font-bold">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="cancelOperation()" class="bg-gray-300 hover:bg-gray-400 text-gray-700 py-2 rounded-lg text-xs font-bold cursor-pointer">Anuluj</button>
                        <button id="confirm-action-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-lg text-xs font-bold cursor-pointer">Zatwierdź</button>
                    </div>
                </div>

                <button onclick="logout()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 rounded-xl transition cursor-pointer text-sm">
                    Wysuń kartę (Wyloguj)
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        let supabaseClient = null;
        let currentUser = null;
        let currentOperation = null; // 'withdraw' lub 'deposit'

        // Sprawdź na starcie, czy klucze są już w pamięci przeglądarki
        window.onload = function() {
            const savedUrl = localStorage.getItem('supa_url');
            const savedKey = localStorage.getItem('supa_key');

            if (savedUrl && savedKey) {
                initSupabase(savedUrl, savedKey);
            }
        };

        // Inicjalizacja Supabase i przełączenie ekranów
        function initSupabase(url, key) {
            try {
                supabaseClient = supabase.createClient(url, key);
                document.getElementById('config-screen').classList.add('hidden');
                document.getElementById('atm-screen').classList.remove('hidden');
                showWelcomeMessage();
            } catch (error) {
                alert('Błąd połączenia! Sprawdź poprawność wprowadzonych danych.');
                disconnectSupabase();
            }
        }

        // Zapisywanie konfiguracji wprowadzonej przez użytkownika
        function saveConfiguration() {
            const url = document.getElementById('supa-url').value.trim();
            const key = document.getElementById('supa-key').value.trim();

            if (!url || !key) {
                alert('Proszę wypełnić oba pola!');
                return;
            }

            localStorage.setItem('supa_url', url);
            localStorage.setItem('supa_key', key);
            initSupabase(url, key);
        }

        // Odłączenie bazy danych i powrót do konfiguracji
        function disconnectSupabase() {
            localStorage.removeItem('supa_url');
            localStorage.removeItem('supa_key');
            supabaseClient = null;
            currentUser = null;
            
            document.getElementById('pin-input').value = '';
            document.getElementById('amount-form').classList.add('hidden');
            document.getElementById('operation-panel').classList.add('hidden');
            document.getElementById('pin-panel').classList.remove('hidden');
            
            document.getElementById('atm-screen').classList.add('hidden');
            document.getElementById('config-screen').classList.remove('hidden');
        }

        // Ekran powitalny bankomatu
        function showWelcomeMessage() {
            document.getElementById('display-content').innerHTML = `
                <p class="text-xl text-emerald-400 animate-pulse">Włóż kartę...</p>
                <p class="text-xs text-slate-400 mt-2">(Wprowadź swój 4-cyfrowy PIN)</p>
            `;
            document.getElementById('user-status').innerText = "BRAK KARTY";
        }

        // Logowanie kodem PIN (pobieranie użytkownika z bazy)
        async var logInWithPin = false; // Zabezpieczenie przed podwójnym kliknięciem
        async function loginWithPin() {
            const pin = document.getElementById('pin-input').value.trim();
            
            if (pin.length !== 4 || isNaN(pin)) {
                updateDisplay('<p class="text-red-400">BŁĄD:<br>PIN musi mieć 4 cyfry!</p>', 2000, showWelcomeMessage);
                return;
            }

            updateDisplay('<p class="animate-pulse text-yellow-400">Weryfikacja karty...</p>');

            try {
                // Pobieramy użytkownika, u którego kod PIN pasuje do wpisanego
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('pin', pin)
                    .single();

                if (error || !data) {
                    updateDisplay('<p class="text-red-500">❌ Odrzucono!<br>Błędny PIN.</p>', 2500, showWelcomeMessage);
                    document.getElementById('pin-input').value = '';
                    return;
                }

                // Sukces logowania
                currentUser = data;
                document.getElementById('pin-panel').classList.add('hidden');
                document.getElementById('operation-panel').classList.remove('hidden');
                document.getElementById('user-status').innerText = currentUser.name.toUpperCase();
                showDashboard();

            } catch (err) {
                updateDisplay('<p class="text-red-400">Błąd połączenia z siecią.</p>', 2000, showWelcomeMessage);
            }
        }

        // Ekran główny po zalogowaniu
        function showDashboard() {
            document.getElementById('amount-form').classList.add('hidden');
            document.getElementById('display-content').innerHTML = `
                <p class="text-sm text-slate-400 text-left">Witaj, ${currentUser.name}!</p>
                <p class="text-xs text-slate-500 text-left mt-1">Stan konta:</p>
                <p class="text-2xl font-bold text-white text-center my-2">${currentUser.balance.toFixed(2)} PLN</p>
                <p class="text-[11px] text-emerald-500/80 animate-pulse">Wybierz operację z panelu poniżej...</p>
            `;
        }

        // Przygotowanie do wypłaty
        function showWithdraw() {
            currentOperation = 'withdraw';
            document.getElementById('amount-input').value = '';
            document.getElementById('amount-form').classList.remove('hidden');
            document.getElementById('confirm-action-btn').className = "bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-xs font-bold cursor-pointer";
            document.getElementById('confirm-action-btn').innerText = "Wypłać";
            document.getElementById('confirm-action-btn').onclick = executeTransaction;
            
            document.getElementById('display-content').innerHTML = `
                <p class="text-base text-yellow-400 font-bold">WYPŁATA ŚRODKÓW</p>
                <p class="text-xs text-slate-300 mt-2">Dostępne: ${currentUser.balance.toFixed(2)} PLN</p>
                <p class="text-xs text-slate-400 mt-1">Wpisz kwotę na klawiaturze poniżej</p>
            `;
        }

        // Przygotowanie do wpłaty
        function show強Deposit() {} 
        function showDeposit() {
            currentOperation = 'deposit';
            document.getElementById('amount-input').value = '';
            document.getElementById('amount-form').classList.remove('hidden');
            document.getElementById('confirm-action-btn').className = "bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-lg text-xs font-bold cursor-pointer";
            document.getElementById('confirm-action-btn').innerText = "Wpłać";
            document.getElementById('confirm-action-btn').onclick = executeTransaction;
            
            document.getElementById('display-content').innerHTML = `
                <p class="text-base text-emerald-400 font-bold">WPŁATA ŚRODKÓW</p>
                <p class="text-xs text-slate-400 mt-2">Włóż banknoty do podajnika</p>
                <p class="text-xs text-slate-400">i wpisz kwotę poniżej</p>
            `;
        }

        // Anulowanie operacji wpłaty/wypłaty
        function cancelOperation() {
            currentOperation = null;
            showDashboard();
        }

        // Wykonanie transakcji w bazie danych Supabase
        async function executeTransaction() {
            const amount = parseFloat(document.getElementById('amount-input').value);

            if (isNaN(amount) || amount <= 0) {
                alert('Proszę podać prawidłową kwotę większą od zera.');
                return;
            }

            let newBalance = currentUser.balance;

            if (currentOperation === 'withdraw') {
                if (amount > currentUser.balance) {
                    updateDisplay('<p class="text-red-500 font-bold">❌ BRAK ŚRODKÓW<br>na koncie!</p>', 2500, showDashboard);
                    return;
                }
                newBalance -= amount;
                updateDisplay('<p class="animate-bounce text-yellow-400">Liczenie gotówki...</p>');
            } else if (currentOperation === 'deposit') {
                newBalance += amount;
                updateDisplay('<p class="animate-pulse text-emerald-400">Przeliczanie banknotów...</p>');
            }

            try {
                // Aktualizacja balansu w bazie Supabase
                const { data, error } = await supabaseClient
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', currentUser.id)
                    .select()
                    .single();

                if (error) throw error;

                // Aktualizacja lokalnego stanu użytkownika i wyświetlenie sukcesu
                currentUser = data;
                
                setTimeout(() => {
                    if (currentOperation === 'withdraw') {
                        updateDisplay('<p class="text-emerald-400 font-bold">💵 PROSZĘ ODEBRAĆ<br>GOTÓWKĘ!</p>', 3000, showDashboard);
                    } else {
                        updateDisplay('<p class="text-emerald-400 font-bold">✅ WPŁATA ZAKOŃCZONA<br>SUKCESEM!</p>', 3000, showDashboard);
                    }
                    currentOperation = null;
                }, 1500);

            } catch (err) {
                alert('Błąd transakcji: ' + err.message);
                showDashboard();
            }
        }

        // Pomocnicza funkcja do zmiany tekstu na ekranie bankomatu
        function updateDisplay(htmlContent, delay = 0, callback = null) {
            document.getElementById('display-content').innerHTML = htmlContent;
            if (delay > 0 && callback) {
                setTimeout(callback, delay);
            }
        }

        // Wylogowanie (Wysunięcie karty)
        function logout() {
            updateDisplay('<p class="text-yellow-400 animate-pulse">Dziękujemy...<br>Odbierz kartę 💳</p>', 2000, () => {
                currentUser = null;
                document.getElementById('pin-input').value = '';
                document.getElementById('operation-panel').classList.add('hidden');
                document.getElementById('pin-panel').classList.remove('hidden');
                showWelcomeMessage();
            });
        }
    </script>
</body>
</html>
