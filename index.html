<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BĄBELKOWY OGRÓD - SYSTEM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', sans-serif; }
        .app-container { width: 100%; max-width: 400px; height: 850px; background: white; margin: auto; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .sidebar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; z-index: 100; transform: translateX(-100%); transition: transform 0.4s ease; }
        .sidebar.active { transform: translateX(0); }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-layer" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-4">SYSTEM BĄBELKOWY</h2>
            <input type="password" id="pass-key" class="w-full p-4 bg-gray-100 rounded-xl mb-4" placeholder="Podaj hasło...">
            <button onclick="checkAccess()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">ODBLOKUJ</button>
        </div>
    </div>

    <div id="app-shell" class="app-container hidden">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center shadow-lg">
            <button onclick="toggleSide(true)" class="text-3xl">☰</button>
            <h1 class="font-bold">BĄBEL-OS</h1>
            <button onclick="location.reload()" class="text-[10px] bg-blue-700 px-2 py-1 rounded-full">EXIT</button>
        </header>

        <div id="sidebar" class="sidebar p-10 text-white">
            <button onclick="toggleSide(false)" class="text-4xl mb-10">✕</button>
            <nav class="space-y-6 text-2xl font-bold">
                <div onclick="setView('main')" class="cursor-pointer">🫧 Skarbonka</div>
                <div onclick="setView('garden')" class="cursor-pointer">🏡 Ogród</div>
                <div onclick="setView('history')" class="cursor-pointer">📊 Historia</div>
            </nav>
        </div>

        <div class="p-6">
            <div id="view-main" class="view active">
                <h2 class="text-3xl font-black">Saldo: <span id="balance">0.00</span> €</h2>
                <button onclick="atmAction()" class="mt-6 w-full bg-green-500 text-white py-4 rounded-xl font-bold">BANKOMAT</button>
                <div id="goals-box" class="mt-6 space-y-3"></div>
            </div>
            <div id="view-garden" class="view">
                <h2 class="text-3xl font-black">Mój Ogród</h2>
                <div id="garden-box" class="grid grid-cols-2 gap-4 mt-4"></div>
            </div>
            <div id="view-history" class="view">
                <h2 class="text-3xl font-black">Historia</h2>
                <div id="history-box" class="mt-4 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('db')) || { bal: 0, goals: [], history: [], garden: [0,0,0,0] };

        function checkAccess() {
            if(document.getElementById('pass-key').value === '123') {
                document.getElementById('login-layer').style.display = 'none';
                document.getElementById('app-shell').classList.remove('hidden');
            } else alert('Błędne hasło');
        }

        function toggleSide(open) { document.getElementById('sidebar').classList.toggle('active', open); }

        function setView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            toggleSide(false);
        }

        function atmAction() {
            let val = parseFloat(prompt("Kwota €:"));
            if(!isNaN(val)) {
                db.bal += val;
                db.history.unshift({type: 'Wpłata', val: val});
                save();
            }
        }

        function save() {
            localStorage.setItem('db', JSON.stringify(db));
            document.getElementById('balance').innerText = db.bal.toFixed(2);
            render();
        }

        function render() {
            document.getElementById('history-box').innerHTML = db.history.map(h => `<div class="p-2 border-b">${h.type}: ${h.val}€</div>`).join('');
        }
        render();
    </script>
</body>
</html>
